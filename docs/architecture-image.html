<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATC Inventory — Architecture Image</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #2a3444;
    --accent: #4fa3e0;
    --text: #cdd9e5;
    --muted: #768a9e;
    --white: #f0f6fc;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(13, 17, 23, 0.94);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--white);
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
  }

  .back-link:hover {
    color: var(--accent);
  }

  .page-title {
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  h1 {
    color: var(--white);
    font-size: 32px;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  .image-shell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    overflow: auto;
  }

  .image-shell img {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 0 auto;
    border-radius: 8px;
  }

  .open-image {
    display: inline-block;
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
  }

  .open-image:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>
  <div class="topbar">
    <a class="back-link" href="../index.html">← Back to Documentation</a>
    <div class="page-title">Architecture Reference</div>
  </div>

  <main class="content">
    <h1>Application Architecture Image</h1>
    <p class="subtitle">Visual reference for the ATC Inventory Application architecture.</p>

    <div class="image-shell">
      <img
        src="../assets/Inventory_App_Architecture_IMG.png"
        alt="ATC Inventory Application architecture diagram"
      >
    </div>

    <a class="open-image" href="../assets/Inventory_App_Architecture_IMG.png">
      Open image directly
    </a>
  </main>
</body>
</html>
